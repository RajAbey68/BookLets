version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: booklets-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: booklets
      POSTGRES_PASSWORD: booklets_dev_2024
      POSTGRES_DB: booklets
    volumes:
      - booklets_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U booklets']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  booklets_pgdata:
