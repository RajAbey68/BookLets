name: CI — Build, Typecheck & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 0

      # Prisma schema validation (npx prisma validate) is already gated in
      # .github/workflows/p0-blockers.yml (step P0.4) on the same push/PR
      # triggers — not duplicated here (RAJ-279).
      - name: Unit tests + coverage gate
        # Runs vitest with v8 coverage; thresholds live in vitest.config.ts
        # (RAJ-279 ratchet — target 80%, see config comment for rationale).
        run: npm run test:unit:coverage

      - name: Upload coverage report
        # Adopted from independent review (RAJ-279): keep the lcov report
        # inspectable even when the coverage gate fails.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: npm run build

      - name: npm audit
        # Scoped gate (RAJ-401): block only on CRITICAL vulnerabilities in
        # PRODUCTION dependencies. Dev-only tooling (vitest/vite) is not shipped,
        # and pre-existing high/moderate dev-dep noise was blocking every feature
        # merge. Full dependency remediation is tracked in RAJ-401.
        run: npm audit --omit=dev --audit-level=critical

  integration:
    name: Real-Postgres Integration Tests
    runs-on: ubuntu-latest
    # RAJ-674 Tier 1 — separate lane from `build`'s mocked-Prisma unit tests.
    # These execute the DB-level controls (fiscal-lock trigger, posted-delete
    # trigger, amount>0 CHECK, RLS policy state) against a REAL Postgres,
    # converting tests/unit/db-integrity-triggers.test.ts's migration-SQL-TEXT
    # regex assertions into actual proof. See vitest.integration.config.ts and
    # tests/integration/*.integration.test.ts.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: booklets_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply schema (prisma db push) + raw-SQL trigger/RLS migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:55432/booklets_test
        run: |
          npx prisma db push --accept-data-loss
          psql "$DATABASE_URL" -f prisma/migrations/20260703_fiscal_lock_and_posted_delete_triggers/migration.sql
          psql "$DATABASE_URL" -f prisma/migrations/20260712_rls_org_isolation/migration.sql
          psql "$DATABASE_URL" -f prisma/migrations/20260716_single_tenant_lock/migration.sql

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:55432/booklets_test
        run: npx vitest run --config vitest.integration.config.ts

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
