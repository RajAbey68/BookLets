name: CI — Build, Typecheck & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 0

      # Prisma schema validation (npx prisma validate) is already gated in
      # .github/workflows/p0-blockers.yml (step P0.4) on the same push/PR
      # triggers — not duplicated here (RAJ-279).
      - name: Unit tests + coverage gate
        # Runs vitest with v8 coverage; thresholds live in vitest.config.ts
        # (RAJ-279 ratchet — target 80%, see config comment for rationale).
        run: npm run test:unit:coverage

      - name: Upload coverage report
        # Adopted from independent review (RAJ-279): keep the lcov report
        # inspectable even when the coverage gate fails.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Enforce coverage ratchet
        run: |
          # Fetch main's vitest.config.ts thresholds
          MAIN_VITEST=$(git show origin/main:vitest.config.ts 2>/dev/null || echo "")
          if [ -z "$MAIN_VITEST" ]; then
            echo "⚠️  Could not fetch main's vitest.config.ts — skipping ratchet check"
            exit 0
          fi
          # Extract threshold values from main and PR branch
          MAIN_LINES=$(echo "$MAIN_VITEST" | grep -oP 'lines:\s*\K\d+' | head -1)
          MAIN_BRANCHES=$(echo "$MAIN_VITEST" | grep -oP 'branches:\s*\K\d+' | head -1)
          MAIN_FUNCTIONS=$(echo "$MAIN_VITEST" | grep -oP 'functions:\s*\K\d+' | head -1)
          PR_LINES=$(grep -oP 'lines:\s*\K\d+' vitest.config.ts | head -1)
          PR_BRANCHES=$(grep -oP 'branches:\s*\K\d+' vitest.config.ts | head -1)
          PR_FUNCTIONS=$(grep -oP 'functions:\s*\K\d+' vitest.config.ts | head -1)
          ERR=0
          if [ -n "$MAIN_LINES" ] && [ "$PR_LINES" -lt "$MAIN_LINES" ]; then
            echo "❌ Ratchet failed: lines threshold dropped from $MAIN_LINES to $PR_LINES"
            ERR=1
          fi
          if [ -n "$MAIN_BRANCHES" ] && [ "$PR_BRANCHES" -lt "$MAIN_BRANCHES" ]; then
            echo "❌ Ratchet failed: branches threshold dropped from $MAIN_BRANCHES to $PR_BRANCHES"
            ERR=1
          fi
          if [ -n "$MAIN_FUNCTIONS" ] && [ "$PR_FUNCTIONS" -lt "$MAIN_FUNCTIONS" ]; then
            echo "❌ Ratchet failed: functions threshold dropped from $MAIN_FUNCTIONS to $PR_FUNCTIONS"
            ERR=1
          fi
          if [ "$ERR" -eq 1 ]; then
            echo "Coverage thresholds must never decrease. Only INCREASE thresholds in PRs."
            exit 1
          fi
          echo "✅ Coverage ratchet passed — no thresholds decreased."

      - name: npm audit
        # Scoped gate (RAJ-401): block only on CRITICAL vulnerabilities in
        # PRODUCTION dependencies. Dev-only tooling (vitest/vite) is not shipped,
        # and pre-existing high/moderate dev-dep noise was blocking every feature
        # merge. Full dependency remediation is tracked in RAJ-401.
        run: npm audit --omit=dev --audit-level=critical

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
