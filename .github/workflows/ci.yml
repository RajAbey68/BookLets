name: CI — Build, Typecheck & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 0

      # Prisma schema validation (npx prisma validate) is already gated in
      # .github/workflows/p0-blockers.yml (step P0.4) on the same push/PR
      # triggers — not duplicated here (RAJ-279).
      - name: Unit tests + coverage gate
        # Runs vitest with v8 coverage; thresholds live in vitest.config.ts
        # (RAJ-539 ratchet — floors of actual coverage, see config comment).
        run: npm run test:unit:coverage

      - name: Enforce coverage ratchet
        # Thresholds may only go up (RAJ-539). Fails the PR if any coverage
        # threshold in vitest.config.ts was lowered or removed relative to the
        # base branch. Fails closed: a missing/unparseable config is an error.
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git show "origin/${{ github.base_ref }}:vitest.config.ts" > /tmp/base-vitest.config.ts
          node scripts/coverage-ratchet.mjs /tmp/base-vitest.config.ts vitest.config.ts

      - name: Upload coverage report
        # Adopted from independent review (RAJ-279): keep the lcov report
        # inspectable even when the coverage gate fails.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: npm run build

      - name: npm audit
        # Scoped gate (RAJ-401): block only on CRITICAL vulnerabilities in
        # PRODUCTION dependencies. Dev-only tooling (vitest/vite) is not shipped,
        # and pre-existing high/moderate dev-dep noise was blocking every feature
        # merge. Full dependency remediation is tracked in RAJ-401.
        run: npm audit --omit=dev --audit-level=critical

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
