name: P1 Governance — RevenueService & LedgerService

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install || true

      - name: "✅ P1.1: RevenueService HIGH_VALUE_THRESHOLD = 10000"
        run: |
          grep -q 'HIGH_VALUE_THRESHOLD = 10000' src/lib/revenue.service.ts || (echo "FAIL: Threshold not set" && exit 1)
          echo "PASS: Revenue threshold enforced"

      - name: "✅ P1.2: RevenueService creates DRAFT for high-value entries"
        run: |
          grep -qE 'JournalStatus\.DRAFT' src/lib/revenue.service.ts || (echo "FAIL: DRAFT status missing" && exit 1)
          echo "PASS: High-value entries require approval"

      - name: "✅ P1.3: LedgerService validates trial balance"
        run: |
          grep -q 'validateTrialBalance' src/lib/ledger.service.ts || (echo "FAIL: Trial balance validation missing" && exit 1)
          grep -q 'balance.isZero()' src/lib/ledger.service.ts || (echo "FAIL: Balance check missing" && exit 1)
          echo "PASS: Trial balance validation enforced"

      # P1.4 re-enabled (E5): session-based identity is now wired — human
      # server actions pass the session user id as makerIdentity and the
      # approval actions enforce maker !== checker via assertNotSelfApproval.
      - name: "✅ P1.4: Segregation of Duties (maker ≠ checker)"
        run: |
          # Primary signal: the behavioral suites that prove the invariant
          # (session-derived maker/checker, self-approval rejected, automation
          # identity constant). Greps below stay as a cheap secondary guard.
          npx vitest run tests/unit/maker-identity.test.ts tests/unit/batch-approval-actions.test.ts || (echo "FAIL: SoD behavioral suites failing" && exit 1)
          grep -q 'export function assertNotSelfApproval' src/lib/approval.service.ts || (echo "FAIL: SoD rule (assertNotSelfApproval) missing" && exit 1)
          grep -q 'assertNotSelfApproval(' src/app/actions/approval.actions.ts || (echo "FAIL: approval actions do not enforce SoD" && exit 1)
          grep -q 'checkerIdentity: userId' src/app/actions/approval.actions.ts || (echo "FAIL: checker identity must come from the session user" && exit 1)
          grep -q 'makerIdentity: userId' src/app/actions/ledger.actions.ts || (echo "FAIL: manual journal entries must carry the session user as maker" && exit 1)
          grep -q 'AUTOMATION_MAKER_IDENTITY' src/lib/automation.service.ts || (echo "FAIL: automation must use the shared service-identity constant" && exit 1)
          if grep -rn --include='*.ts' --include='*.tsx' "booklets-automation-service" src/ | grep -v 'src/lib/maker-identity.ts'; then
            echo "FAIL: hardcoded service identity outside src/lib/maker-identity.ts"
            exit 1
          fi
          echo "PASS: Segregation of duties enforced (maker != checker, session-derived identities)"

      - name: "✅ P1.5: Immutable audit trail (EvidenceLog hash chain)"
        run: |
          test -f src/lib/evidence-log.service.ts || (echo "FAIL: EvidenceLogService file missing" && exit 1)
          grep -q 'evidenceLog.create' src/lib/evidence-log.service.ts || (echo "FAIL: EvidenceLog write missing" && exit 1)
          grep -q "createHash('sha256')" src/lib/evidence-log.service.ts || (echo "FAIL: sha256 hash generation missing" && exit 1)
          grep -q 'EvidenceLogService.record' src/lib/ledger.service.ts || (echo "FAIL: LedgerService does not record evidence" && exit 1)
          echo "PASS: Immutable audit trail wired"

  summary:
    runs-on: ubuntu-latest
    needs: governance-gates
    if: always()
    steps:
      - name: P1 Governance Status
        run: |
          if [ "${{ needs.governance-gates.result }}" == "success" ]; then
            echo "✅ ✅ ✅ ALL P1 GOVERNANCE GATES PASSED ✅ ✅ ✅"
            exit 0
          else
            echo "❌ P1 governance validation failed"
            exit 1
          fi
