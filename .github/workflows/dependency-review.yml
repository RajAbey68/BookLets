name: Dependency Review

# Blocks a PR that introduces a dependency with a high+ known vulnerability or a
# denied license — native GitHub, no token. Complements CodeQL (SAST) and
# Dependabot (existing-dep alerts). Runs on PRs only (it diffs the manifest).
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
